# ai-backup paths configuration
# One path per line. Lines starting with # are comments.
# Supports ~ for home directory.
# Directories are synced recursively. Individual files are copied as-is.
# The destination in the repo mirrors the last path component.

# Claude Code skills
~/.agents/skills

# Claude Desktop config files
~/Library/Application Support/Claude/claude_desktop_config.json
~/Library/Application Support/Claude/config.json
~/Library/Application Support/Claude/window-state.json
~/Library/Application Support/Claude/git-worktrees.json

# Claude Code settings (~/.claude)
~/.claude

# Shell config (note: .zshrc excluded — contains secrets)
~/.zprofile
~/.bashrc
~/.bash_profile
